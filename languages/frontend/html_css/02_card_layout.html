<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Layout</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 2rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
    .card { background: white; border-radius: 12px; padding: 1rem; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .tag { display: inline-block; padding: 0.25rem 0.6rem; background: #eaf2ff; border-radius: 999px; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>Cards de estudo</h1>
  <div class="grid">
    <div class="card"><span class="tag">HTML/CSS</span><h2>Estrutura</h2><p>Treinar semântica e layout.</p></div>
    <div class="card"><span class="tag">JavaScript</span><h2>DOM</h2><p>Manipular elementos e eventos.</p></div>
    <div class="card"><span class="tag">React</span><h2>Componentes</h2><p>Separar interface em blocos reutilizáveis.</p></div>
  </div>
</body>
</html>
